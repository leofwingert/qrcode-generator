spring.application.name=qrcode.generator
# Use environment variables when available, otherwise fall back to safe defaults
aws.s3.region=${AWS_REGION:us-east-2}
aws.s3.bucket-name=${AWS_BUCKET_NAME:qr-code-storage-bucket27}
# Allow overriding the server port via the SERVER_PORT env var (default 8080)
server.port=${SERVER_PORT:8080}
